syntax = "proto3";
package coaether.plugin.v1;

option go_package = "github.com/coaether/server/plugin/proto";

// ===== Plugin Service (implemented by plugin, called by host) =====

service Plugin {
  rpc Init(InitRequest) returns (InitResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
  rpc OnHook(HookRequest) returns (HookResponse);
  rpc OnMessage(MessageRequest) returns (MessageResponse);
  rpc OnTick(TickRequest) returns (TickResponse);
}

message InitRequest {
  string plugin_id = 1;
  string workspace_id = 2;
  string data_dir = 3;
  bytes config = 4;
}

message InitResponse {
  bool ready = 1;
  string error_message = 2;
}

message HealthCheckRequest {}
message HealthCheckResponse {
  bool healthy = 1;
  string message = 2;
  int64 uptime_ms = 3;
}

message ShutdownRequest { string reason = 1; }
message ShutdownResponse {}

message HookRequest {
  string hook_name = 1;
  map<string, string> context = 2;
  bool async = 3;
}

message HookResponse {
  bool aborted = 1;
  string error_message = 2;
  map<string, string> mutated_context = 3;
}

message MessageRequest {
  string from = 1;
  string type = 2;
  bytes payload = 3;
}

message MessageResponse {
  bool handled = 1;
  bytes response_payload = 2;
}

message TickRequest {
  string task_id = 1;
  int64 scheduled_at = 2;
}
message TickResponse {}


// ===== PluginHost Service (implemented by host, called by plugin) =====

service PluginHost {
  rpc QueryTasks(QueryTasksRequest) returns (QueryTasksResponse);
  rpc QueryProjects(QueryProjectsRequest) returns (QueryProjectsResponse);
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc UpdateTask(UpdateTaskRequest) returns (UpdateTaskResponse);
  rpc DeleteTask(DeleteTaskRequest) returns (DeleteTaskResponse);
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
  rpc Log(LogRequest) returns (LogResponse);
  rpc KvStoreGet(KvStoreGetRequest) returns (KvStoreGetResponse);
  rpc KvStoreSet(KvStoreSetRequest) returns (KvStoreSetResponse);
  rpc KvStoreDelete(KvStoreDeleteRequest) returns (KvStoreDeleteResponse);
}

message QueryTasksRequest {
  string project_id = 1;
  string assignee_id = 2;
  string status = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message QueryTasksResponse {
  bytes tasks_json = 1;
}

message QueryProjectsRequest {}
message QueryProjectsResponse {
  bytes projects_json = 1;
}

message CreateTaskRequest {
  bytes task_json = 1;
}
message CreateTaskResponse {
  bytes task_json = 1;
}

message UpdateTaskRequest {
  string task_id = 1;
  bytes updates_json = 2;
}
message UpdateTaskResponse {
  bytes task_json = 1;
}

message DeleteTaskRequest { string task_id = 1; }
message DeleteTaskResponse {}

message SendMessageRequest {
  string to = 1;
  string type = 2;
  bytes payload = 3;
}
message SendMessageResponse {}

message CheckPermissionRequest {
  string permission = 1;
  string resource_id = 2;
}
message CheckPermissionResponse {
  bool allowed = 1;
}

message LogRequest {
  enum Level { DEBUG = 0; INFO = 1; WARN = 2; ERROR = 3; }
  Level level = 1;
  string message = 2;
  map<string, string> fields = 3;
}
message LogResponse {}

message KvStoreGetRequest { string key = 1; }
message KvStoreGetResponse {
  bytes value = 1;
  bool exists = 2;
}

message KvStoreSetRequest {
  string key = 1;
  bytes value = 2;
  int64 ttl_ms = 3;
}
message KvStoreSetResponse {}

message KvStoreDeleteRequest { string key = 1; }
message KvStoreDeleteResponse {}


// ===== PluginFrontend Service (implemented by host, called by frontend proxy) =====

service PluginFrontend {
  rpc GetComponent(GetComponentRequest) returns (GetComponentResponse);
  rpc CallAction(CallActionRequest) returns (CallActionResponse);
}

message GetComponentRequest {
  string component_name = 1;
  bytes props = 2;
}

message GetComponentResponse {
  string html = 1;
  bytes initial_data = 2;
}

message CallActionRequest {
  string action = 1;
  bytes payload = 2;
}

message CallActionResponse {
  bytes data = 1;
  string error = 2;
}
