root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server.exe ."
  bin = "./tmp/server.exe"
  full_bin = ""
  log = "build-errors.log"
  delay_ms = 1000
  exclude_dir = ["tmp", "webui", "node_modules", ".git", ".claude"]
  exclude_file = []
  exclude_regex = [".*\\.tmp$", "_test\\.go$"]
  exclude_unchanged = true
  follow_symlink = false
  include_dir = ["."]
  include_ext = ["go", "tpl", "tmpl", "html"]

[color]
  main = "cyan"
  build = "yellow"
  runner = "green"

[log]
  time = true

[misc]
  clean_on_exit = true
